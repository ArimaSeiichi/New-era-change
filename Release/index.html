<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新纪元·异能者与妖兽</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC',sans-serif;background:#0a0e14;color:#c8d6e5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#141b24;border:1px solid #2a3a4e;border-radius:12px;padding:24px 32px;width:420px;max-width:90vw}
h1{font-size:22px;color:#e8edf3;margin-bottom:4px}
.sub{font-size:13px;color:#6b8299;margin-bottom:20px}
label{display:block;font-size:13px;color:#8da4bc;margin:12px 0 4px}
input,select{width:100%;padding:8px 12px;background:#0d1219;border:1px solid #2a3a4e;border-radius:6px;color:#e8edf3;font-size:14px;outline:none}
input:focus,select:focus{border-color:#4a90d9}
.row{display:flex;gap:12px}
.row>div{flex:1}
.switch-row{display:flex;align-items:center;justify-content:space-between;margin:8px 0}
.switch-row span{font-size:13px;color:#8da4bc}
.toggle{width:44px;height:24px;background:#2a3a4e;border-radius:12px;cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:#4a90d9}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#c8d6e5;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.btn{width:100%;padding:10px;background:#4a90d9;border:none;border-radius:6px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px}
.btn:hover{background:#5aa0e9}
.divider{height:1px;background:#2a3a4e;margin:16px 0}
.badge{display:inline-block;background:#1a2a3a;color:#4a90d9;font-size:11px;padding:2px 8px;border-radius:10px;margin-right:4px}
</style>
</head>
<body>
<div class="card">
<h1>⚡ 新纪元·异能者与妖兽</h1>
<p class="sub">2034年 · 异能二中</p>

<label>角色姓名</label>
<input type="text" id="name" placeholder="输入你的角色名" value="">

<label>性别</label>
<select id="gender">
<option value="">待定</option><option value="男">男</option><option value="女">女</option>
</select>

<div class="row">
<div><label>年龄</label><input type="number" id="age" placeholder="16" value="16" min="14" max="25"></div>
<div><label>异能等阶</label><select id="rank"><option value="1">一等</option><option value="2" selected>二等</option><option value="3">三等</option></select></div>
</div>

<label>身份背景</label>
<input type="text" id="bg" placeholder="如：异能二中学生 / 外围区猎人" value="异能二中学生">

<div class="divider"></div>

<div class="switch-row">
<span>👥 联机模式</span>
<div class="toggle" id="multiplayer" onclick="this.classList.toggle('on')"></div>
</div>

<div class="switch-row">
<span>🛡️ 生存系统</span>
<select id="survival" style="width:120px">
<option value="关闭">关闭</option>
<option value="基础模式" selected>基础模式</option>
<option value="生存模式">生存模式</option>
</select>
</div>

<button class="btn" onclick="start()">⚡ 进入新纪元</button>
</div>

<script>
async function start(){
  const name=document.getElementById('name').value.trim()||'未命名';
  const gender=document.getElementById('gender').value||'未定';
  const age=document.getElementById('age').value||'16';
  const rank=document.getElementById('rank').value||'2';
  const bg=document.getElementById('bg').value.trim()||'异能二中学生';
  const mp=document.getElementById('multiplayer').classList.contains('on');
  const sv=document.getElementById('survival').value;

  const presetId='new-era-espers';

  try{
    // Set worldbook entries
    const entries=[];
    const wb=await getWorldbook();
    wb.forEach(e=>{
      if(e.name&&e.name.startsWith('[WB]异能者')){
        entries.push({name:e.name,enabled:true});
      }
      if(e.name&&(e.name.startsWith('[WB]拟人魔兽')||e.name.startsWith('[WB]修玛吉亚')||e.name.startsWith('[WB]咒术')||e.name.startsWith('[WB]诅咒')||e.name.startsWith('[WB]恶魔'))){
        entries.push({name:e.name,enabled:true});
      }
    });

    // Set player info
    const playerInfo={
      姓名:name,性别:gender,年龄:parseInt(age),
      身份信息:{职业:bg,阶层:'学生'},
      所属势力:bg.includes('一中')?'异能一中':'异能二中'
    };

    // Configure survival mode
    const survivalMode=sv==='生存模式'?'生存模式':sv==='基础模式'?'基础模式':'关闭';

    // Build greeting
    const greeting=`/sys 角色已创建。\n
姓名: ${name} | 性别: ${gender} | 年龄: ${age}岁 | ${bg} | ${rank==='3'?'三等':rank==='2'?'二等':'一等'}异能者\n
联机模式: ${mp?'开启':'关闭'} | 生存系统: ${survivalMode}\n
---\n
现在是2034年9月1日，异能二中新学期开学日。你站在校门口，看着这座传说中的"剑圣的摇篮"。`;

    // Send to SillyTavern
    window.parent.postMessage({
      type:'tavern_helper_setup',
      preset:presetId,
      playerInfo:playerInfo,
      settings:{生存系统模式:survivalMode},
      greeting:greeting,
      worldbookEntries:entries
    },'*');

  }catch(e){
    alert('初始化失败: '+e.message);
  }
}
</script>
</body>
</html>
